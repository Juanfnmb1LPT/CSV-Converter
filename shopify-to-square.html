<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shopify → Square Converter (Final)</title>

  <!-- PapaParse CDN -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="site">
    <div class="card spacious">
    <a class="back" href="index.html">← Back</a>
    <div class="hero">
      <div class="logo"><img src="assets/lpt_realty.png" alt="LPT Realty logo"></div>
      <div class="hero-title">Shopify → Square CSV Converter</div>
      <div class="hero-sub">Files processed locally in your browser.</div>
    </div>

    <div class="note-container">
      <label class="file-control">
        <span class="file-btn">Choose File</span>
        <span class="file-name">No file chosen</span>
        <input type="file" id="csvFile" accept=".csv" />
      </label>
      <button class="btn" id="convertBtn">Download Square Ready CSV</button>
    </div>

    <div class="note">
      Select a Shopify CSV exported from your store. The download will be a CSV file ready to import to Square.
    </div>
  </div>
</div>

  <script src="shop_to_square.js"></script>
  <script>
    (function(){
      const input = document.getElementById('csvFile');
      const nameSpan = document.querySelector('.file-name');
      const convertBtn = document.getElementById('convertBtn');

      if (input && nameSpan) {
        input.addEventListener('change', () => {
          const f = input.files[0];
          nameSpan.textContent = f ? f.name : 'No file chosen';
        });
      }

      if (convertBtn) {
        convertBtn.addEventListener('click', () => convertCSV());
      }
    })();
  </script>

</body>
</html>
